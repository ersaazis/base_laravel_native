services:
  app:
    build:
      context: .
    ports:
      - "8001:8001"
    volumes:
      - .:/var/www/html
  jump:
    build:
      context: .
    ports:
      - "8001:8001"
      - "8100:8100"
      - "8100:8100"
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
    volumes:
      - .:/var/www/html
